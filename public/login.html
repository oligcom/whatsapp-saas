<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Gerador WhatsApp</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      padding: 2.25rem 2rem;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem;
      margin-bottom: 2rem;
      text-align: center;
    }

    .logo-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #128c7e;
    }

    .logo-sub {
      font-size: .8rem;
      color: #888;
    }

    label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: #444;
      margin-bottom: .35rem;
    }

    .field { margin-bottom: 1.1rem; }

    input {
      width: 100%;
      padding: .65rem .8rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: .95rem;
      font-family: inherit;
      color: #222;
      background: #fafafa;
      transition: border-color .15s;
    }

    input:focus {
      outline: none;
      border-color: #25d366;
      background: #fff;
    }

    .btn-login {
      width: 100%;
      padding: .75rem;
      background: #25d366;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      margin-top: .25rem;
    }

    .btn-login:hover { background: #1da851; }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }

    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-label { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      margin-top: 1rem;
      padding: .6rem .85rem;
      background: #fff0f0;
      border: 1.5px solid #fca5a5;
      border-radius: 8px;
      font-size: .875rem;
      color: #b91c1c;
      display: none;
    }

    .error-msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg width="48" height="48" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="19" cy="19" r="19" fill="#25d366"/>
        <path d="M27.5 10.5A11.5 11.5 0 0 0 7.9 24.1L6.5 31.5l7.6-1.4A11.5 11.5 0 1 0 27.5 10.5zm-8.5 17a9.4 9.4 0 0 1-4.8-1.3l-.35-.2-3.6.66.68-3.5-.23-.36a9.5 9.5 0 1 1 8.3 4.7zm5.2-7.1c-.28-.14-1.67-.82-1.93-.91-.26-.1-.45-.14-.64.14-.19.28-.73.91-.9 1.1-.16.19-.33.21-.61.07a7.7 7.7 0 0 1-2.27-1.4 8.5 8.5 0 0 1-1.57-1.95c-.16-.28 0-.43.13-.57.13-.12.28-.33.42-.49.14-.17.19-.28.28-.47.1-.19.05-.36-.02-.5-.07-.14-.64-1.54-.88-2.1-.23-.55-.47-.48-.64-.49h-.55c-.19 0-.49.07-.75.35-.26.28-1 1-.97 2.43.02 1.43 1.05 2.82 1.2 3.01.14.19 2.07 3.16 5.02 4.43.7.3 1.25.48 1.68.62.7.22 1.34.19 1.85.11.56-.08 1.73-.71 1.97-1.39.24-.68.24-1.27.17-1.39-.07-.12-.26-.19-.55-.33z" fill="#fff"/>
      </svg>
      <div class="logo-title">Gerador de Mensagens</div>
      <div class="logo-sub">Faça login para continuar</div>
    </div>

    <form id="form">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="seu@email.com" autocomplete="email" required />
      </div>

      <div class="field">
        <label for="password">Senha</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>

      <button type="submit" class="btn-login" id="btnLogin">
        <div class="spinner"></div>
        <span class="btn-label">Entrar</span>
      </button>
    </form>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <script src="/auth.js"></script>
  <script>
    // Se já tem sessão válida, redireciona direto
    (function () {
      const session = getSession();
      if (session && session.expires_at && Date.now() / 1000 < session.expires_at - 60) {
        if (session.role === "gestor")        location.href = "/admin.html";
        else if (session.role === "cliente")  location.href = "/cliente.html";
        else                                  location.href = "/";
      }
    })();

    const form = document.getElementById("form");
    const btnLogin = document.getElementById("btnLogin");
    const errorMsg = document.getElementById("errorMsg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorMsg.classList.remove("visible");
      btnLogin.classList.add("loading");
      btnLogin.disabled = true;

      try {
        const res = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("email").value.trim(),
            password: document.getElementById("password").value,
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Erro ao fazer login");
        }

        setSession(data);
        if (data.role === "gestor")        location.href = "/admin.html";
        else if (data.role === "cliente")  location.href = "/cliente.html";
        else                               location.href = "/";
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.classList.add("visible");
      } finally {
        btnLogin.classList.remove("loading");
        btnLogin.disabled = false;
      }
    });
  </script>
</body>
</html>
